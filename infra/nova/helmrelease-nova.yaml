apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ${OS_SERVICE}
  namespace: ${OS_SERVICE}
spec:
  interval: 60s
  chart:
    spec:
      chart: ${OS_SERVICE}
      version: 0.3.49
      sourceRef:
        kind: HelmRepository
        name: openstack-helm
        namespace: flux-system
  install:
    disableWait: true
  upgrade:
    disableWait: true
  valuesFrom:
  - kind: ConfigMap
    name: ${OS_SERVICE}-values
  - kind: ConfigMap
    name: images-values
  - kind: Secret
    name: endpoints-values
  - kind: Secret
    name: ${OS_SERVICE}-secret-values
  - kind: Secret
    name: endpoints-nova-values

    # rabbitmq admin
  - kind: Secret
    name: rabbitmq-default-user
    valuesKey: username
    targetPath: endpoints.oslo_messaging.auth.admin.username
  - kind: Secret
    name: rabbitmq-default-user
    valuesKey: password
    targetPath: endpoints.oslo_messaging.auth.admin.password

  postRenderers:
    # https://kubectl.docs.kubernetes.io/references/kustomize/kustomization/patches/
    # https://fluxcd.io/flux/components/helm/api/#helm.toolkit.fluxcd.io/v2.Kustomize
    - kustomize:
        # workaround for bug in helm-toolkit.snippets.kubernetes_pod_rbac_roles
        patches:
          - patch: |-
              - op: replace
                path: /subjects/0/namespace
                value: ${OS_SERVICE}
            target:
              kind: RoleBinding
          # SSH ID RSA is base64 encored due to issue substituting multilines vars
          # The patch belows add an init container that will decode the key.
          - patch: |-
              - op: add
                path: /spec/template/spec/initContainers/-
                value:
                  name: fix-ssh
                  command: ["/bin/sh"]
                  args:
                    - -c
                    - >-
                      cp /var/lib/nova/.ssh/id_rsa /var/lib/nova/.ssh/id_rsa_encoded &&
                      cat /var/lib/nova/.ssh/id_rsa_encoded | base64 -d > /var/lib/nova/.ssh/id_rsa &&
                      chown -R nova:nova /var/lib/nova/.ssh
                  image: ${IMAGE_NOVA}
                  imagePullPolicy: IfNotPresent
                  securityContext:
                    runAsUser: 0
                  volumeMounts:
                  - mountPath: /var/lib/nova
                    name: varlibnova
            target:
              kind: DaemonSet
              name: nova-compute-[a-z0-9-]+
          - patch: |-
              - op: add
                path: /spec/template/metadata/labels/elastic_app
                value: "${OS_SERVICE}"
            target:
              kind: Deployment
              labelSelector: "application=${OS_SERVICE}"

          # GPU pcihole64 fix for H100 nodes (intel-gpu=nvidia-h100-94gb)
          #
          # Nova 29.4.0 ignores hw:pcihole64; libvirt 8.0.0 strips
          # <pcihole64> for q35. H100L 94GB needs ~128GB BAR1 each;
          # 2 GPUs need 512GB (549755813888 bytes) PCI hole.
          # Fix: inject `-global q35-pcihost.pci-hole64-size=<bytes>`
          # via <qemu:commandline> when hw:pcihole64 is set in flavor.
          #
          # Init container patches nova/virt/libvirt/config.py and
          # driver.py, then mounts them over originals in nova-compute.
          - patch: |-
              apiVersion: apps/v1
              kind: DaemonSet
              metadata:
                name: not-used
              spec:
                template:
                  spec:
                    volumes:
                      - name: pcihole64-patches
                        emptyDir: {}
                      - name: pcihole64-pycache
                        emptyDir: {}
                    initContainers:
                      - name: patch-pcihole64
                        image: ${IMAGE_NOVA}
                        imagePullPolicy: IfNotPresent
                        securityContext:
                          readOnlyRootFilesystem: true
                          runAsUser: 0
                        command:
                          - python3
                          - -c
                          - |
                            import re, sys
                            from pathlib import Path

                            import nova.virt.libvirt
                            BASE = Path(nova.virt.libvirt.__path__[0])
                            PATCHES = Path('/patches')

                            print(f'[pcihole64] nova libvirt path: {BASE}')

                            # --- 1. config.py: add qemu_args to LibvirtConfigGuest ---
                            print('[1/2] Patching config.py ...')
                            src = (BASE / 'config.py').read_text()
                            if 'qemu_args' in src:
                                print('  already patched')
                            else:
                                anchor = re.compile(
                                    r'(class LibvirtConfigGuest\b.*?'
                                    r'def __init__.*?self\.metadata\s*=\s*\[\])',
                                    re.DOTALL)
                                m = anchor.search(src)
                                if not m:
                                    sys.exit('ERROR: LibvirtConfigGuest.__init__ anchor not found')
                                src = (src[:m.end()]
                                       + '\n        self.qemu_args = []'
                                       + src[m.end():])

                                fmt = re.compile(
                                    r'(class LibvirtConfigGuest\b.*?'
                                    r'def format_dom\(self\).*?)'
                                    r'(        return root\n)',
                                    re.DOTALL)
                                m2 = fmt.search(src)
                                if not m2:
                                    sys.exit('ERROR: format_dom return not found')
                                injection = (
                                    "        if self.qemu_args:\n"
                                    "            qemu_ns = 'http://libvirt.org/schemas/domain/qemu/1.0'\n"
                                    "            cmdline = etree.SubElement(root, '{%s}commandline' % qemu_ns)\n"
                                    "            for val in self.qemu_args:\n"
                                    "                arg_el = etree.SubElement(cmdline, '{%s}arg' % qemu_ns)\n"
                                    "                arg_el.set('value', val)\n")
                                src = src[:m2.start(2)] + injection + m2.group(2) + src[m2.end():]
                                print('  done')
                            (PATCHES / 'config.py').write_text(src)

                            # --- 2. driver.py: inject qemu_args from hw:pcihole64 ---
                            print('[2/2] Patching driver.py ...')
                            src = (BASE / 'driver.py').read_text()
                            if 'qemu_args' in src:
                                print('  already patched')
                            else:
                                pat = re.compile(
                                    r'(if\s+self\._guest_needs_pcie\(guest\)\s*:\s*\n(\s+))'
                                    r'(self\._guest_add_pcie_root_ports\(guest'
                                    r'(?:,\s*pcihole64=_pcihole64)?\))')
                                m3 = pat.search(src)
                                if not m3:
                                    sys.exit('ERROR: _guest_needs_pcie call site not found')
                                ind = m3.group(2)
                                new_code = (
                                    "_pcihole64 = flavor.extra_specs.get('hw:pcihole64')\n"
                                    + ind + "LOG.warning('PCIHOLE64 extra_specs=%s val=%s', "
                                            "flavor.extra_specs, _pcihole64)\n"
                                    + ind + "self._guest_add_pcie_root_ports(guest)\n"
                                    + ind + "if _pcihole64:\n"
                                    + ind + "    guest.qemu_args.extend("
                                            "['-global', 'q35-pcihost.pci-hole64-size=%s' "
                                            "% _pcihole64])\n"
                                    + ind + "    LOG.warning('PCIHOLE64 injected qemu_args=%s', "
                                            "guest.qemu_args)")
                                src = src[:m3.start()] + m3.group(1) + new_code + src[m3.end():]
                                print('  done')
                            (PATCHES / 'driver.py').write_text(src)

                            (PATCHES / 'LIBVIRT_PATH').write_text(str(BASE))
                            print(f'[pcihole64] patched files written to {PATCHES}')
                        volumeMounts:
                          - name: pcihole64-patches
                            mountPath: /patches
                    containers:
                      - name: nova-compute
                        volumeMounts:
                          # Python 3.10 (Caracal 2024.1)
                          - name: pcihole64-patches
                            mountPath: /var/lib/openstack/lib/python3.10/site-packages/nova/virt/libvirt/config.py
                            subPath: config.py
                          - name: pcihole64-patches
                            mountPath: /var/lib/openstack/lib/python3.10/site-packages/nova/virt/libvirt/driver.py
                            subPath: driver.py
                          - name: pcihole64-pycache
                            mountPath: /var/lib/openstack/lib/python3.10/site-packages/nova/virt/libvirt/__pycache__
                          # Python 3.12 (Epoxy 2025.1)
                          - name: pcihole64-patches
                            mountPath: /var/lib/openstack/lib/python3.12/site-packages/nova/virt/libvirt/config.py
                            subPath: config.py
                          - name: pcihole64-patches
                            mountPath: /var/lib/openstack/lib/python3.12/site-packages/nova/virt/libvirt/driver.py
                            subPath: driver.py
                          - name: pcihole64-pycache
                            mountPath: /var/lib/openstack/lib/python3.12/site-packages/nova/virt/libvirt/__pycache__
            target:
              kind: DaemonSet
              name: nova-compute-intel-gpu-[a-z0-9]+